name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run CLI against sample traces (expected non-zero exit)
        run: |
          set +e
          arh validate --policy samples/policy.json samples/traces/*.json \
            --json-out /tmp/report.json --md-out /tmp/report.md
          code=$?
          echo "arh exit code: $code"
          # Sample traces intentionally include failing scenarios (budget
          # violation, unsafe pattern, missing citations), so a non-zero
          # exit code here is expected and just proves the CLI wiring works
          # end to end, not a CI failure.
          exit 0
